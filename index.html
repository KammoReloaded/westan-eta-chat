<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
</head>
<body>

<div id="chat-launcher" style="position:fixed;bottom:24px;right:24px;z-index:2147483647;font-family:sans-serif;">
  <div id="chat-window" style="position:absolute;bottom:68px;right:0;width:420px;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.25);flex-direction:column;background:white;display:none;transition:opacity 0.2s ease,transform 0.2s ease;">
    <div id="chat-header" style="background:#FE6000;color:white;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;flex-shrink:0;cursor:pointer;user-select:none;" onclick="toggleMinimize()">
      <span>💬 Westan ETA Assistant</span>
      <button id="minimize-btn" onclick="event.stopPropagation();toggleMinimize();" style="background:none;border:none;color:white;cursor:pointer;font-size:22px;line-height:1;padding:0 4px;">−</button>
    </div>
    <div id="chat-body" style="height:540px;overflow:hidden;transition:height 0.3s ease;">
      <iframe
        id="chat-iframe"
        src="https://webchat.botframework.com/embed/vail-eta-bot?s=90caTQD2QCpFHUbVlf4APsCYra3GL0LRmt4g0xeKdX7zpwZenMwMJQQJ99CBAC3pKaRAArohAAABAZBS2AJT.3r3t9Uq8Xrww5YU41CT3306IvVLbEjJIozWC0vr9uK2YLgokYZqJJQQJ99CBAC3pKaRAArohAAABAZBS2ha6"
        title="Westan ETA Assistant"
        style="border:none;width:100%;height:100%;min-height:0;display:block;">
      </iframe>
    </div>
  </div>
  <button id="chat-bubble" onclick="toggleChat()" style="height:48px;padding:0 16px 0 12px;border-radius:24px;background:#FE6000;color:white;border:none;cursor:pointer;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-left:auto;position:relative;z-index:2147483647;">💬 Westan ETA Assistant</button>
</div>

<script>
  (function() {
    var isOpen = false;

    window.toggleChat = function() {
      var chatWindow = document.getElementById('chat-window');
      var chatBody = document.getElementById('chat-body');
      var minimizeBtn = document.getElementById('minimize-btn');
      isOpen = !isOpen;
      if (isOpen) {
        chatWindow.style.display = 'flex';
        chatBody.style.height = '540px';
        minimizeBtn.textContent = '−';
      } else {
        chatWindow.style.display = 'none';
      }
    };

    window.toggleMinimize = function() {
      var chatBody = document.getElementById('chat-body');
      var minimizeBtn = document.getElementById('minimize-btn');
      var isMinimized = chatBody.style.height === '0px';
      chatBody.style.height = isMinimized ? '540px' : '0px';
      minimizeBtn.textContent = isMinimized ? '−' : '+';
    };
  })();
</script>

</body>
</html>
